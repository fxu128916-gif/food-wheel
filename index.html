<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🍜 今天吃什么？</title>
<style>
  :root { --bg:#FFFBEB; --primary:#F97316; --text:#1C1917; --card:#FFFFFF; --shadow:0 4px 20px rgba(0,0,0,0.08); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px 16px 40px; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  .header { text-align:center; margin-bottom:8px; }
  .header h1 { font-size:30px; font-weight:800; color:var(--text); letter-spacing:2px; }
  .header .subtitle { font-size:13px; color:#A8A29E; margin-top:4px; }

  .wheel-wrapper { position:relative; width:min(330px,82vw); height:min(330px,82vw); margin:10px auto 16px; }
  .wheel-pointer { position:absolute; top:-20px; left:50%; transform:translateX(-50%); z-index:10; width:0; height:0; border-left:20px solid transparent; border-right:20px solid transparent; border-top:36px solid var(--primary); filter:drop-shadow(0 2px 3px rgba(0,0,0,0.2)); }
  canvas#wheelCanvas { width:100%; height:100%; border-radius:50%; box-shadow:0 8px 30px rgba(0,0,0,0.12); cursor:pointer; }
  .wheel-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:56px; height:56px; border-radius:50%; background:white; box-shadow:0 2px 12px rgba(0,0,0,0.15); display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; z-index:5; transition:transform 0.15s; }
  .wheel-center:active { transform:translate(-50%,-50%) scale(0.9); }

  .btn-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
  .btn { padding:13px 26px; border-radius:50px; border:none; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.2s; letter-spacing:1px; }
  .btn-primary { background:var(--primary); color:white; box-shadow:0 4px 15px rgba(249,115,22,0.35); }
  .btn-primary:active { transform:scale(0.95); }
  .btn-outline { background:white; color:var(--primary); border:2px solid var(--primary); }
  .btn-outline:active { transform:scale(0.95); }

  .result-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.3s; }
  .result-overlay.show { opacity:1; pointer-events:auto; }
  .result-card { background:white; border-radius:24px; padding:36px 28px; text-align:center; max-width:320px; width:85%; box-shadow:0 20px 60px rgba(0,0,0,0.2); animation:popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes popIn { from{transform:scale(0.7);opacity:0;} to{transform:scale(1);opacity:1;} }
  .result-emoji { font-size:72px; margin-bottom:10px; animation:bounce 0.5s ease infinite alternate; }
  @keyframes bounce { from{transform:translateY(0);} to{transform:translateY(-10px);} }
  .result-text { font-size:28px; font-weight:800; color:var(--text); margin-bottom:8px; }
  .result-sub { font-size:14px; color:#999; margin-bottom:20px; }
  .result-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .result-actions .btn { padding:12px 22px; font-size:14px; }

  .food-list-section { width:100%; max-width:380px; margin-top:20px; text-align:center; }
  .food-list-title { font-size:12px; color:#A8A29E; margin-bottom:8px; }
  .food-tags { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .food-tag { padding:4px 12px; border-radius:20px; background:white; font-size:12px; color:#78716C; border:1px solid #E7E5E4; }

  .history-section { width:100%; max-width:380px; margin-top:14px; }
  .history-title { font-size:12px; color:#A8A29E; text-align:center; margin-bottom:6px; }
  .history-bar { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .history-tag { padding:5px 14px; border-radius:20px; background:#F5F5F4; font-size:12px; color:#78716C; }
  .clear-history { font-size:11px; color:#ccc; cursor:pointer; display:block; text-align:center; margin-top:6px; border:none; background:none; }
  .clear-history:hover { color:#EF4444; }

  .loading { text-align:center; padding:60px; color:#A8A29E; font-size:16px; }
  .loading .spinner { display:inline-block; width:30px; height:30px; border:3px solid #E7E5E4; border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:12px; }
  @keyframes spin { to{transform:rotate(360deg);} }

  .footer { margin-top:auto; padding-top:20px; font-size:11px; color:#D6D3D1; text-align:center; }
</style>
</head>
<body>

<div class="header">
  <h1>🍜 今天吃什么？</h1>
  <p class="subtitle">转转大转盘，告别纠结！</p>
</div>

<div id="loadingBox" class="loading"><div class="spinner"></div><div>美食加载中...</div></div>

<div id="mainBox" style="display:none;width:100%;display:none;flex-direction:column;align-items:center;">
  <div class="wheel-wrapper" id="wheelWrapper">
    <div class="wheel-pointer"></div>
    <canvas id="wheelCanvas"></canvas>
    <div class="wheel-center" id="spinBtn">🍽️</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="spin()">🎰 转一转</button>
    <button class="btn btn-outline" onclick="quickPick()">🎲 随手选</button>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-text" id="resultText"></div>
      <div class="result-sub" id="resultSub"></div>
      <div class="result-actions">
        <button class="btn btn-outline" onclick="closeResult()">👌 就它了</button>
        <button class="btn btn-primary" onclick="closeResult();spin();">🔄 再转一次</button>
      </div>
    </div>
  </div>

  <div class="food-list-section">
    <p class="food-list-title">📋 当前美食清单</p>
    <div class="food-tags" id="foodTags"></div>
  </div>

  <div class="history-section">
    <p class="history-title">📜 最近转到的</p>
    <div class="history-bar" id="historyBar"></div>
    <button class="clear-history" onclick="clearHistory()" id="clearHistoryBtn" style="display:none;">清除记录</button>
  </div>
</div>

<div class="footer">✨ 管理员维护 · 云端同步 ✨</div>

<script>
const COLORS=['#FF6B6B','#4ECDC4','#FFD93D','#6C5CE7','#A8E6CF','#FF8A80','#80D8FF','#FFE082','#B388FF','#CCFF90','#FFAB91','#82B1FF','#EA80FC','#B9F6CA','#FFD740','#FF9FF3','#54A0FF','#5F27CD','#01A3A4','#F368E0'];
const DEFAULTS=[{name:'火锅',emoji:'🫕'},{name:'麻辣烫',emoji:'🌶️'},{name:'烤肉',emoji:'🥩'},{name:'饺子',emoji:'🥟'},{name:'寿司',emoji:'🍣'},{name:'披萨',emoji:'🍕'}];

let options=[], history=loadHistory(), currentAngle=0, spinning=false;

function loadHistory(){ try{const s=localStorage.getItem('food_history');if(s)return JSON.parse(s);}catch(e){} return[]; }
function saveHistory(){ localStorage.setItem('food_history',JSON.stringify(history.slice(-20))); }

function drawWheel(){
  const c=document.getElementById('wheelCanvas'); if(!c)return;
  const ctx=c.getContext('2d'), size=c.parentElement.clientWidth, dpr=Math.min(devicePixelRatio||1,2);
  c.width=size*dpr; c.height=size*dpr; c.style.width=size+'px'; c.style.height=size+'px';
  ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
  const cx=size/2,cy=size/2,outerR=size/2-4, n=options.length; if(!n)return;
  const sa=(2*Math.PI)/n;
  options.forEach((o,i)=>{
    const a=currentAngle+i*sa-Math.PI/2, ae=a+sa;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,outerR,a,ae); ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length]; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2; ctx.stroke();
    const ma=a+sa/2, tr=outerR*0.6, tx=cx+tr*Math.cos(ma), ty=cy+tr*Math.sin(ma);
    ctx.save(); ctx.translate(tx,ty); ctx.rotate(ma+Math.PI/2); ctx.fillStyle='#1C1917';
    const t=o.emoji+' '+o.name;
    ctx.font=t.length>6?'bold 11px sans-serif':'bold 14px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(t,0,0); ctx.restore();
  });
  ctx.beginPath(); ctx.arc(cx,cy,outerR,0,2*Math.PI); ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=3; ctx.stroke();
}

function spin(){
  if(spinning||!options.length)return; spinning=true;
  const n=options.length, sa=360/n, ti=Math.floor(Math.random()*n);
  const tr=(3+Math.floor(Math.random()*4))*360+(360-ti*sa);
  const saDeg=currentAngle*(180/Math.PI), dur=4000+Math.random()*1000, st=performance.now();
  (function animate(ts){
    const e=ts-st, p=Math.min(e/dur,1), es=1-Math.pow(1-p,3.5);
    currentAngle=((saDeg+tr*es)*Math.PI/180)%(2*Math.PI); drawWheel();
    p<1?requestAnimationFrame(animate):(currentAngle%=(2*Math.PI),spinning=false,showResult(options[ti]));
  })(st);
}

function quickPick(){ if(options.length)showResult(options[Math.floor(Math.random()*options.length)]); }

const FT=['安排上了！','就决定是它了！','今天盘它！','味蕾已就位🤤','好吃不纠结！','来自大转盘的钦点✨','命运的抉择！'];
function showResult(o){
  document.getElementById('resultEmoji').textContent=o.emoji;
  document.getElementById('resultText').textContent=o.name;
  document.getElementById('resultSub').textContent=FT[Math.floor(Math.random()*FT.length)];
  document.getElementById('resultOverlay').classList.add('show');
  history.push({name:o.name,emoji:o.emoji,time:Date.now()}); saveHistory(); renderHistory();
}
function closeResult(){ document.getElementById('resultOverlay').classList.remove('show'); }

async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(r.ok) options=await r.json(); else throw new Error('bad');
  }catch(e){ options=[...DEFAULTS]; }
  document.getElementById('loadingBox').style.display='none';
  document.getElementById('mainBox').style.display='flex';
  document.getElementById('foodTags').innerHTML=options.map(o=>`<span class="food-tag">${o.emoji} ${o.name}</span>`).join('');
  drawWheel(); renderHistory();
}

function renderHistory(){
  const b=document.getElementById('historyBar'), cb=document.getElementById('clearHistoryBtn');
  if(!history.length){ b.innerHTML='<span class="history-tag" style="background:none;color:#ccc;">还没有转过呢~</span>'; if(cb)cb.style.display='none'; return; }
  if(cb)cb.style.display='block';
  b.innerHTML=history.slice(-10).reverse().map(h=>`<span class="history-tag">${h.emoji} ${h.name}</span>`).join('');
}
function clearHistory(){ history=[]; saveHistory(); renderHistory(); }

document.getElementById('spinBtn').addEventListener('click',e=>{e.stopPropagation();spin();});
document.getElementById('wheelCanvas').addEventListener('click',spin);
window.addEventListener('resize',drawWheel);
loadData();
</script>
</body>
</html>
